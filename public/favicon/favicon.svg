<svg xmlns="http://www.w3.org/2000/svg" version="1.1" xmlns:xlink="http://www.w3.org/1999/xlink" width="32" height="32"><svg xmlns="http://www.w3.org/2000/svg" version="1.1" xmlns:xlink="http://www.w3.org/1999/xlink" width="32" height="32"><svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#2D5F5D"></rect>
  
  <!-- Quran book/pages design -->
  <g transform="translate(4, 3)">
    <!-- Right page -->
    <path d="M 12 1 L 21 1 C 21.8 1 22.5 1.7 22.5 2.5 L 22.5 24 C 22.5 24.8 21.8 25.5 21 25.5 L 12 26.5 Z" fill="#F5F5DC" stroke="#D4AF37" stroke-width="0.8"></path>
    
    <!-- Left page -->
    <path d="M 12 1 L 3 1 C 2.2 1 1.5 1.7 1.5 2.5 L 1.5 24 C 1.5 24.8 2.2 25.5 3 25.5 L 12 26.5 Z" fill="#F5F5DC" stroke="#D4AF37" stroke-width="0.8"></path>
    
    <!-- Center binding -->
    <line x1="12" y1="1" x2="12" y2="26.5" stroke="#D4AF37" stroke-width="1.5"></line>
    
    <!-- Arabic-inspired decorative lines (representing text) -->
    <line x1="4" y1="6" x2="11" y2="6" stroke="#2D5F5D" stroke-width="0.6" opacity="0.6"></line>
    <line x1="4" y1="9" x2="11" y2="9" stroke="#2D5F5D" stroke-width="0.6" opacity="0.6"></line>
    <line x1="4" y1="12" x2="10" y2="12" stroke="#2D5F5D" stroke-width="0.6" opacity="0.6"></line>
    <line x1="4" y1="15" x2="11" y2="15" stroke="#2D5F5D" stroke-width="0.6" opacity="0.6"></line>
    
    <line x1="13" y1="6" x2="20" y2="6" stroke="#2D5F5D" stroke-width="0.6" opacity="0.6"></line>
    <line x1="13" y1="9" x2="20" y2="9" stroke="#2D5F5D" stroke-width="0.6" opacity="0.6"></line>
    <line x1="14" y1="12" x2="20" y2="12" stroke="#2D5F5D" stroke-width="0.6" opacity="0.6"></line>
    <line x1="13" y1="15" x2="20" y2="15" stroke="#2D5F5D" stroke-width="0.6" opacity="0.6"></line>
    
    <!-- Small star accent (Islamic motif) -->
    <circle cx="12" cy="20" r="2" fill="#D4AF37" opacity="0.8"></circle>
    <circle cx="12" cy="20" r="1" fill="#2D5F5D"></circle>
  </g>
</svg></svg><style>@media (prefers-color-scheme: light) { :root { filter: none; } }
@media (prefers-color-scheme: dark) { :root { filter: none; } }
</style></svg>