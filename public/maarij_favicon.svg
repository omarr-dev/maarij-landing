<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#2D5F5D"/>
  
  <!-- Quran book/pages design -->
  <g transform="translate(8, 6)">
    <!-- Right page -->
    <path d="M 8 2 L 14 2 C 14.5 2 15 2.5 15 3 L 15 17 C 15 17.5 14.5 18 14 18 L 8 19 Z" 
          fill="#F5F5DC" 
          stroke="#D4AF37" 
          stroke-width="0.5"/>
    
    <!-- Left page -->
    <path d="M 8 2 L 2 2 C 1.5 2 1 2.5 1 3 L 1 17 C 1 17.5 1.5 18 2 18 L 8 19 Z" 
          fill="#F5F5DC" 
          stroke="#D4AF37" 
          stroke-width="0.5"/>
    
    <!-- Center binding -->
    <line x1="8" y1="2" x2="8" y2="19" stroke="#D4AF37" stroke-width="1"/>
    
    <!-- Arabic-inspired decorative lines (representing text) -->
    <line x1="3" y1="5" x2="7" y2="5" stroke="#2D5F5D" stroke-width="0.5" opacity="0.6"/>
    <line x1="3" y1="7" x2="7" y2="7" stroke="#2D5F5D" stroke-width="0.5" opacity="0.6"/>
    <line x1="3" y1="9" x2="6.5" y2="9" stroke="#2D5F5D" stroke-width="0.5" opacity="0.6"/>
    
    <line x1="9" y1="5" x2="13" y2="5" stroke="#2D5F5D" stroke-width="0.5" opacity="0.6"/>
    <line x1="9" y1="7" x2="13" y2="7" stroke="#2D5F5D" stroke-width="0.5" opacity="0.6"/>
    <line x1="9.5" y1="9" x2="13" y2="9" stroke="#2D5F5D" stroke-width="0.5" opacity="0.6"/>
    
    <!-- Small star accent (Islamic motif) -->
    <circle cx="8" cy="13" r="1.5" fill="#D4AF37" opacity="0.8"/>
    <circle cx="8" cy="13" r="0.7" fill="#2D5F5D"/>
  </g>
</svg>